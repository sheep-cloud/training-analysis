<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Analysis - 2026-06-30</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #f9f9f9;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            background: #d4edda;
            color: #155724;
        }

        .footer {
            background: #f9f9f9;
            padding: 20px 40px;
            text-align: center;
            color: #666;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Training Analysis Report</h1>
            <p>2026-06-30</p>
        </div>

        <div class="content">
            <!-- Summary -->
            <div class="section">
                <h2>Daily Summary</h2>
                <div class="stat-grid">
                    <div class="stat-card">
                        <h3>Workouts</h3>
                        <div class="value">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Duration</h3>
                        <div class="value">0</div>
                        <div>minutes</div>
                    </div>
                    <div class="stat-card">
                        <h3>Calories Burned</h3>
                        <div class="value">0</div>
                        <div>kcal</div>
                    </div>
                    <div class="stat-card">
                        <h3>Training Load</h3>
                        <div class="value">0</div>
                    </div>
                </div>
            </div>

            <!-- Strength Training -->
            

            <!-- Cardio Activities -->
            
        </div>

        <div class="footer">
            <p>Data source: Xunji App + Coros App</p>
            <p style="margin-top: 10px; font-size: 0.9em;">Generated: 2026-06-30 11:21:43</p>
        </div>
    </div>
</body>
</html>
